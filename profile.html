<!doctype html>
<html lang="en">
  <head>
    <title>DTC07 - 1800 PROJECT</title>
    <meta name="comp1800 template" content="My 1800 App" />

    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Other libraries go here -->

    <!-- Tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- CSS Stylesheet -->
    <link rel="stylesheet" href="/styles/style.css" />

    <!-- Web components for shared navbar and footer layout -->
    <script type="module" src="src\components\site-footer.js"></script>
    <script type="module" src="src\components\site-navbar.js"></script>

  </head>
  <body>
    <!-- NAVBAR -->
    <site-navbar></site-navbar>

    <main class="min-h-screen  m-auto flex flex-col justify-between ">
      <!-- Profile Content Area -->
      <div class="max-w-6xl m-auto p-10">
        <div class="flex flex-col gap-2">
          <h1 class="text-5xl font-bold">Profile Settings</h1>
          <p class="text-slate-500 text-xl">This information will appear on your public profile</p>
        </div>
        <!-- USER INPUT AREA -->
        <section class="flex p-12 items-center gap-8 flex-col md:flex-row justify-evenly">
          <!-- LEFT SIDE OF SETTINGS -->
          <div id="setting-left" class="max-w-1/3">
            <img src="./images/Profile.svg" class='rounded-full h-auto w-2/3 shadow-xl hover:cursor-pointer'>
          </div>
          <!-- RIGHT SIDE OF SETTINGS -->
          <form id="settings-right" class=" max-w-2/3 border border-slate-500 w-full rounded-xl p-10 shadow-xl flex flex-col gap-6">
            <div id="profile-option-1" class="flex flex-col gap-2">
              <h1 class="text-3xl font-semibold">Username</h1>
              <p id="username" placeholder="Steve Sports" name="username"  class="text-2xl break-all">@messifan79</p>
            </div>
            <div id="profile-option-1" class="flex flex-col gap-2">
              <h1 class="text-3xl font-semibold">Email</h1>
              <p id="user-email" placeholder="Steve Sports" name="user-email"  class="text-2xl break-all">stevesports@gmail.com</p>
            </div>
            <div id="profile-option-2" class="flex flex-col gap-2">
              <h1 class="text-3xl font-semibold">Age</h1>
              <p id="user-age" class="text-2xl">45</p>
            </div>
            <div id="profile-option-3" class="flex flex-col gap-2 ">
              <h1 class="text-3xl font-semibold">Language</h1>
              <select id="user-language" class="text-2xl border border-slate-500 rounded-xl p-2 hover:cursor-pointer">
                <option value="english">English</option>
                <option value="french">French</option>
                <option value="mandarin">Mandarin</option>
                <option value="cantonese">Cantonese</option>
                <option value="italian">Italian</option>
              </select>
            </div>
            <div id="profile-option-4" class="flex flex-col gap-2">
              <h1 class="text-3xl font-semibold">Location</h1>
              <div class="flex gap-4 items-center">
                <p id="user-location" class="p-2 text-2xl">Vancouver, BC</p>           
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="32"
                  height="32"
                  viewBox="0 0 24 24"
                  fill="#eab308"
                >
                  <path d="M18.364 4.636a9 9 0 0 1 .203 12.519l-.203 .21l-4.243 4.242a3 3 0 0 1 -4.097 .135l-.144 -.135l-4.244 -4.243a9 9 0 0 1 12.728 -12.728zm-6.364 3.364a3 3 0 1 0 0 6a3 3 0 0 0 0 -6z" />
                </svg>

              </div>
            </div>
            </form>
        </section>
      </div>
      <!-- ABOVE FOOTER DECORATION PNGS -->
      <div class="flex justify-between">
        <img src="/images/soccer-png1.png"  width="130px">
        <img src="/images/soccer-png2.png" width="130px">
        <img src="/images/soccer-png3.png" width="130px">
      </div>
    </main>

  <!--START OF FOOTER-->
  <site-footer></site-footer>
    <!---------------------------------------------->
    <!-- Your own JavaScript functions go here    -->
    <!---------------------------------------------->
    <!-- Link to scripts of your own -->
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
