  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Other libraries go here -->

    <!-- CSS Stylesheet -->
    <link rel="stylesheet" href="/styles/style.css" />
    
    <!-- Web components for shared navbar and footer layout -->
    <script type="module" src="src\components\site-footer.js"></script>

  <body>
    <site-navbar></site-navbar>

    <!-- START OF MAIN BANNER -->
    <main class="">
      <div class="hero-section flex flex-col max-w-6xl mx-auto justify-center py-12">
        <div id="hero-center" class="flex justify-between items-center">

          <!-- left -->
          <img src="/images/vertical-side-banner1.png">
          <!-- middle -->
          <div class="flex justify-center flex-col items-center gap-7 p-5">
            <span
              id="hero-text"
              class="flex flex-col items-center text-center justify-center gap-4"
            >
              <h1 class="text-5xl">
                <strong>Welcome <span id="user-name"></span> to TeamUp!</strong>
              </h1>
              <h2 class="text-2xl font-semibold">The Sports Community Platform.</h2>
              <h2 class="text-2xl font-semibold">Where you can cheer for a team with a team.</h2>
            </span>
            <button
              class="bg-yellow-400 rounded-full p-3 text-xl drop-shadow-xl hover:cursor-pointer active:bg-[#fde047]"
            >
              <h3>Get Started</h3>
            </button>
          </div>
          <!-- right -->
          <img src="/images/vertical-side-banner2.png" alt="">
        </div>
        <div id="CTA" class="flex w-full justify-center"></div>
      </div>
    </main>
    <!-- END OF MAIN BANNER -->

      <!-- CARDS SECTION -->
      <div class="lg:max-w-6xl md:max-w-4xl  max-w-2xl mx-auto my-16 px-5">
      <!-- CREATE EVENT BUTTON -->
        <div id=create-event-button class="flex justify-end">
          <a href="/create-event.html">
            <button class="text-3xl bg-[#facc15] flex items-center gap-2  rounded-full p-2 shadow-xl hover:cursor-pointer active:bg-[#fde047]">
              <span class="pb-1">
              Create Event
              </span>
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="32"
                height="32"
                viewBox="0 0 24 24"
                fill="currentColor"
              >
                <path d="M4.929 4.929a10 10 0 1 1 14.141 14.141a10 10 0 0 1 -14.14 -14.14zm8.071 4.071a1 1 0 1 0 -2 0v2h-2a1 1 0 1 0 0 2h2v2a1 1 0 1 0 2 0v-2h2a1 1 0 1 0 0 -2h-2v-2z" />
              </svg>
            </button>
          </a>
          </div>
        <!-- In-Person Events -->
        <div class="flex justify-between text-5xl py-8 md:text-start items-end">
          Local Events
          <button id="local-events-see-all-btn" class="text-sm font-semibold bg-[#282828] text-white p-2 rounded-full">See all events</button>
        </div>

        <div id="local-events-grid" class="grid lg:grid-cols-3 lg:grid-row-2 md:grid-cols-2 md:grid-row-3 gap-4 justify-center items-center">
        
          
        </div>

      <!-- Online Events -->
      <div class="flex justify-between text-5xl py-8 my-8 md:text-start items-end">
        Online Events
        <button id="online-events-see-all-btn" class="text-sm font-semibold bg-[#282828] text-white p-2 rounded-full">See all events</button>
        </div>
      <div id="online-events-grid" class="grid lg:grid-cols-3 lg:grid-row-2 md:grid-cols-2 md:grid-row-3 gap-4 justify-center items-center">
        
        
      </div>
    </div>
  </main>
  <!-- END OF CARDS SECTION -->
