<!doctype html>
<html lang="en">
  <head>
    <title>DTC07 - 1800 PROJECT</title>
    <meta name="comp1800 template" content="My 1800 App" />

    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Other libraries go here -->
    <!-- Tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- CSS Stylesheet -->
    <link rel="stylesheet" href="/styles/style.css" />

    <!-- Web components for shared navbar and footer layout -->
    <script type="module" src="src\components\site-footer.js"></script>
    <script type="module" src="src\components\site-navbar.js"></script>
  </head>
  <body>
    <!-- NAVBAR -->
    <site-navbar></site-navbar>

    <!------------------------------>
    <!-- HERO SECTION -->
    <!------------------------------>

    <main class="">
      <div
        class="hero-section flex flex-col max-w-6xl mx-auto justify-center py-6"
      >
        <h1 class="flex justify-center text-3xl sm:text-5xl pb-4">
          <strong>Welcome to TeamUp</strong>
        </h1>
        <div
          id="hero-center"
          class="flex justify-center max-[350px]:justify-between items-center"
        >
          <!-- left -->
          <img
            class="min-w-0 max-[350px]:hidden"
            src="/images/vertical-side-banner1.png"
          />
          <!-- middle -->
          <div class="flex justify-center flex-col items-center gap-7 p-5">
            <span
              id="hero-text"
              class="flex flex-col items-center text-center justify-center gap-4"
            >
              <h2 class="hidden sm:block sm:text-2xl font-semibold">
                The Sports Community Platform.
              </h2>
              <h2 class="text-lg sm:text-2xl font-semibold">
                Cheer for a team with a team!
              </h2>
            </span>
            <button
              class="bg-yellow-400 rounded-full p-1 text-sm sm:text-xl drop-shadow-xl hover:cursor-pointer active:bg-[#fde047]"
            >
              <p>Get Started</p>
            </button>
          </div>
          <!-- right -->
          <img
            class="min-w-0 max-[350px]:hidden"
            src="/images/vertical-side-banner2.png"
            alt=""
          />
        </div>
        <div id="CTA" class="flex w-full justify-center"></div>
      </div>
    </main>

    <!-- something FIFA related -->
    <div class="bg-green-800 text-center text-white py-1 px-2">
      <a href="#">
        <p>
          <a href="/search-results.html?q=FIFA"
            >FIFA World Cup 2026 is here! See community related events</a
          >
        </p>
      </a>
    </div>

    <!-- CARDS SECTION -->
    <div class="lg:max-w-6xl md:max-w-4xl max-w-2xl mx-auto my-12 px-5">
      <!-- CREATE EVENT BUTTON -->
      <div id="create-event-button" class="flex justify-center">
        <a href="/create-event.html">
          <button
            class="text-3xl bg-[#facc15] flex items-center gap-2 rounded-full p-2 shadow-xl hover:cursor-pointer active:bg-[#fde047]"
          >
            <span class="pb-1"> Create Event </span>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="32"
              height="32"
              viewBox="0 0 24 24"
              fill="currentColor"
            >
              <path
                d="M4.929 4.929a10 10 0 1 1 14.141 14.141a10 10 0 0 1 -14.14 -14.14zm8.071 4.071a1 1 0 1 0 -2 0v2h-2a1 1 0 1 0 0 2h2v2a1 1 0 1 0 2 0v-2h2a1 1 0 1 0 0 -2h-2v-2z"
              />
            </svg>
          </button>
        </a>
      </div>
      <!-- In-Person Events -->
      <div class="flex justify-between text-5xl py-8 md:text-start items-end">
        Local Events
        <button
          id="local-events-see-all-btn"
          class="text-sm font-semibold bg-[#282828] text-white p-2 rounded-full"
        >
          See all events
        </button>
      </div>
      <div
        id="local-events-grid"
        class="grid lg:grid-cols-3 lg:grid-row-2 md:grid-cols-2 md:grid-row-3 gap-4 justify-center items-center"
      >
        <!-- cards will be generated by loadEvents function in main.js and templateEventCard.js -->
      </div>

      <!-- Online Events -->
      <div
        class="flex justify-between text-5xl pt-5 my-8 md:text-start items-end"
      >
        Online Events
        <button
          id="online-events-see-all-btn"
          class="text-sm font-semibold bg-[#282828] text-white p-2 rounded-full"
        >
          See all events
        </button>
      </div>
      <div
        id="online-events-grid"
        class="grid lg:grid-cols-3 lg:grid-row-2 md:grid-cols-2 md:grid-row-3 gap-4 justify-center items-center overflow-hidden pb-8"
      >
        <!-- cards will be generated by loadEvents function in main.js and templateEventCard.js -->
      </div>
    </div>

    <!--START OF FOOTER-->
    <site-footer></site-footer>

    <!---------------------------------------------->
    <!-- Your own JavaScript functions go here    -->
    <!---------------------------------------------->
    <!-- Link to scripts of your own -->
    <script type="module" src="/src/isUserLoggedIndex.js"></script>
    <script type="module" src="/src/loadEventsIndex.js"></script>
    <script type="module" src="/src/search.js"></script>

    <!-- loading the JS from loadEventsIndex to generate the event cards -->
  </body>
</html>
